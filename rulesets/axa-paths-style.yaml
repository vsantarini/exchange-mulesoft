  axa-plurals-collection:
    type: style
    description: Resources with a collection must be plural
    given: '$.paths.*~'
    message: '{{error}}'
    recommended: true
    severity: error
    then:
      function: axa-path-collections-plurals 

  axa-plurals-path:
    type: style
    description: Path Resources without a collection should be plural
    given: '$.paths.*~'
    message: '{{error}}'
    recommended: true
    severity: hint
    then:
      function: axa-path-segments-plurals     