extends:
 - spectral:oas # estende le regole built-in di Spectral per OAS

rules:

 # ── Informazioni generali ───────────────────────────────
 info-contact-required:
 description: "API must have a contact object in info"
 severity: error
 given: "$.info"
 then:
 field: contact
 function: truthy

 info-description-required:
 description: "API must have a description"
 severity: error
 given: "$.info"
 then:
 field: description
 function: truthy

 info-version-semver:
 description: "API version must follow Semantic Versioning (x.y.z)"
 severity: error
 given: "$.info.version"
 then:
 function: pattern
 functionOptions:
 match: "^[0-9]+\\.[0-9]+\\.[0-9]+$"

 # ── Operazioni ──────────────────────────────────────────
 operation-summary-required:
 description: "Every operation must have a summary"
 severity: error
 given: "$.paths.*[get,post,put,patch,delete,options,head]"
 then:
 field: summary
 function: truthy

 operation-operationId-required:
 description: "Every operation must have an operationId"
 severity: error
 given: "$.paths.*[get,post,put,patch,delete]"
 then:
 field: operationId
 function: truthy

 operation-operationId-kebab-case:
 description: "operationId must be in kebab-case"
 severity: warning
 given: "$.paths.*[get,post,put,patch,delete].operationId"
 then:
 function: pattern
 functionOptions:
 match: "^[a-z][a-z0-9\\-]+$"

 # ── Responses ───────────────────────────────────────────
 response-success-required:
 description: "Every operation must define at least one 2xx response"
 severity: error
 given: "$.paths.*[get,post,put,patch,delete].responses"
 then:
 function: schema
 functionOptions:
 schema:
 type: object
 minProperties: 1
 patternProperties:
 "^2[0-9]{2}$":
 type: object

 response-error-required:
 description: "Every operation must define at least a 4xx or 5xx response"
 severity: warning
 given: "$.paths.*[get,post,put,patch,delete].responses"
 then:
 function: schema
 functionOptions:
 schema:
 type: object
 patternProperties:
 "^[45][0-9]{2}$":
 type: object

 # ── Sicurezza ────────────────────────────────────────────
 security-scheme-defined:
 description: "API must define at least one security scheme"
 severity: error
 given: "$.components.securitySchemes"
 then:
 function: truthy

 operation-security-defined:
 description: "Every operation must reference a security scheme"
 severity: warning
 given: "$.paths.*[get,post,put,patch,delete]"
 then:
 field: security
 function: truthy

 # ── Naming conventions ───────────────────────────────────
 path-kebab-case:
 description: "Path segments must be in kebab-case"
 severity: warning
 given: "$.paths[*]~"
 then:
 function: pattern
 functionOptions:
 match: "^(\\/[a-z0-9\\-{}]+)+$"

 # ── Tags ─────────────────────────────────────────────────
 operation-tags-required:
 description: "Every operation must have at least one tag"
 severity: warning
 given: "$.paths.*[get,post,put,patch,delete]"
 then:
 field: tags
 function: truthy